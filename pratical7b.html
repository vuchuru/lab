<!DOCTYPE html>
<html>
<head>
<title>Cricket Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
background: url('C:\Users\bapan\Downloads\practical7.jpg') no-repeat center/cover;
}



.box {
background: rgba(0,0,0,0.7);
color: white;
border-radius: 10px;
padding: 25px;
}
h3 {
color: yellow;
margin-bottom: 20px;
}
.form-control, .form-select {
margin-bottom: 20px;
}
.btn {
background: lightgreen;
font-weight: bold;
margin-top: 10px;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="box" style="width:400px;">

<h3 class="text-center"> cricket Ticket Booking</h3>



<form>
<input class="form-control" placeholder="First Name">
<input class="form-control" placeholder="Last Name">
<input type="email" class="form-control" placeholder="Email">
<input type="tel" class="form-control" placeholder="Phone Number">

<select class="form-select">
<option>RCB vs SRH</option>
<option>CSK vs MI</option>
</select>

<input type="date" class="form-control">
<input type="number" class="form-control" placeholder="Tickets">

<button class="btn w-100">Book Now</button>
</form>

</div>
</div>

</body>
</html>
